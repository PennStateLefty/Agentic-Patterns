site_name: Agentic Patterns
site_description: Industry-recognized AI agent orchestration patterns and implementation guidance
site_url: https://pennstatelefty.github.io/Agentic-Patterns/
theme:
  name: material
docs_dir: docs
site_dir: site
plugins:
  - search
  - mermaid2:
      version: 10.4.0
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Architecture Position: agentic-patterns-architecture-position.md
  - Implementation Guide: agentic-patterns-implementation-guide.md
